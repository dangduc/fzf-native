name: Build And Publish Binaries

on:
  workflow_dispatch:
  push:
    branches: ["develop"]
    paths: ["**.c", "**.h"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Clean stale binaries
      shell: bash
      run: rm -rf bin

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --verbose --config ${{env.BUILD_TYPE}}

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: bin-${{ matrix.os }}
        path: bin/
        if-no-files-found: error
        retention-days: 1

  build-freebsd:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Clean stale binaries
      run: rm -rf bin

    - name: Build in FreeBSD VM
      uses: vmactions/freebsd-vm@v1
      with:
        usesh: true
        prepare: |
          pkg install -y cmake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          cmake --build build --verbose --config ${{env.BUILD_TYPE}}

    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: bin-freebsd
        path: bin/
        if-no-files-found: error
        retention-days: 1

  commit:
    needs: [build, build-freebsd]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download all binaries
      uses: actions/download-artifact@v4
      with:
        path: bin-artifacts
        pattern: bin-*
        merge-multiple: true

    - name: Stage binaries
      run: |
        mkdir -p bin
        cp -R bin-artifacts/. bin/
        rm -rf bin-artifacts

    - name: Bump version
      id: bump
      run: |
        current=$(grep -E '^;; Version: ' fzf-native.el | sed -E 's/^;; Version: //')
        major=$(echo "$current" | cut -d. -f1)
        minor=$(echo "$current" | cut -d. -f2)
        minor=$((minor + 1))
        if [ "$minor" -ge 10 ]; then
          major=$((major + 1))
          minor=0
        fi
        new="${major}.${minor}"
        sed -i "s/^;; Version: ${current}$/;; Version: ${new}/" fzf-native.el
        sed -i -E "s/^([[:space:]]+)\"${current}\"$/\1\"${new}\"/" Eask
        echo "version=${new}" >> "$GITHUB_OUTPUT"
        echo "Bumped $current -> $new"

    - name: Commit changes
      uses: EndBug/add-and-commit@v9
      with:
        author_name: github-actions
        author_email: github-actions@github.com
        message: Update binaries for all platforms
        add: |
          bin/**
          fzf-native.el
          Eask
        tag: ${{ steps.bump.outputs.version }}
